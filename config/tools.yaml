# Tool usage caps (cost control for tests)
kb_retrieve:
  top_k: 3
  max_inject_tokens: 5000
  expand_parent: true
  content_types:
    - text
    - table
    - formula
    - figure

tavily_search:
  api_key_file: setting/API-key/Tavily-API-key.txt
  max_results: 3
  search_depth: basic
  include_raw_content: false  # body via fetch_page only

fetch_page:
  max_urls_per_turn: 2
  max_body_tokens: 4000
  timeout_sec: 30
  user_agent: Mozilla/5.0 (compatible; AI-Assistant-Loop/0.2)

run_local_script:
  whitelist_dirs:
    - scripts/Tools
  timeout_sec: 60
  max_stdout_chars: 8000

registry:
  max_tool_calls_per_task: 20
